<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masuk - Monitoring Produk</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Proteksi Sesi Login Awal -->
    <script>
      const activeRole = localStorage.getItem("loggedInRole");
      if (activeRole) {
        window.location.href = "dashboard.html";
      }
    </script>
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <img
          src="logo.png"
          alt="Logo"
          style="height: 60px; margin-bottom: 20px"
        />
        <h2 style="margin-bottom: 5px">Selamat Datang</h2>
        <p
          style="
            color: var(--color-text-light);
            font-size: 14px;
            margin-bottom: 25px;
          "
        >
          Silakan masuk ke sistem monitoring
        </p>
        <form id="loginForm">
          <div class="form-group" style="text-align: left">
            <label>Username</label>
            <input
              type="text"
              id="loginUsername"
              placeholder="Masukkan username.."
              required
            />
          </div>
          <div class="form-group" style="text-align: left; position: relative">
            <label>Password</label>
            <input
              type="password"
              id="loginPassword"
              placeholder="Masukkan password.."
              required
              style="padding-right: 40px"
            />
            <i
              class="fas fa-eye-slash"
              id="togglePassword"
              style="
                position: absolute;
                right: 15px;
                top: 38px;
                cursor: pointer;
                color: var(--color-text-light);
              "
            ></i>
          </div>
          <p
            id="loginError"
            style="
              color: #ef4444;
              font-size: 13px;
              display: none;
              margin-bottom: 15px;
            "
          >
            Password salah!
          </p>
          <button type="submit" class="btn-submit" style="width: 100%">
            Masuk
          </button>
        </form>
      </div>
    </div>

    <script src="js/login.js"></script>
  </body>
</html>
